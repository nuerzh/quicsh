name: CI

on:
  push:
    tags: ["v*"]
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择编译平台 (Select Target)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

defaults:
  run:
    shell: bash

env:
  PACKAGE: "clash"
  RUST_TOOLCHAIN: "nightly"

jobs:
  compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # 将 Secret 映射到 Job 环境变量，以便在 if 语句中使用
    env:
      TAR_PASS_SECRET: ${{ secrets.TAR_PASS }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            extra-args: -F "plus"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            extra-args: -F "plus"
            rustflags: "-C linker=aarch64-linux-gnu-gcc"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            postfix: ".exe"
            extra-args: -F "plus"

    steps:
      - name: Check if should run
        id: check_run
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_target }}" != "all" && "${{ github.event.inputs.build_target }}" != "${{ matrix.target }}" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust Toolchain
        if: steps.check_run.outputs.should_skip != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rust-src # 必须包含 rust-src 才能使用 -Z build-std

      - name: Verify Target
        if: steps.check_run.outputs.should_skip != 'true'
        run: |
          rustup target add ${{ matrix.target }}
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Install Dependencies (Linux)
        if: steps.check_run.outputs.should_skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install NASM
        if: steps.check_run.outputs.should_skip != 'true'
        uses: ilammy/setup-nasm@v1

      - name: Decrypt and Extract Extra Files
        # 使用 env.TAR_PASS_SECRET 而不是 secrets.TAR_PASS
        if: steps.check_run.outputs.should_skip != 'true' && env.TAR_PASS_SECRET != ''
        run: |
          openssl des3 -md sha256 -d -k "$TAR_PASS_SECRET" -salt -in extra.tar.gz | tar -xzvf -

      - name: Cargo Build
        if: steps.check_run.outputs.should_skip != 'true'
        working-directory: clash-rs
        run: |
          # 加上 -Z build-std=std,panic_abort 以解决 aarch64 core 库缺失问题
          cargo build --release --target ${{ matrix.target }} ${{ matrix.extra-args }} -Z build-std=std,panic_abort --package clash-rs
        env:
          RUSTFLAGS: --cfg tokio_unstable ${{ matrix.rustflags }}

      - name: Upload Artifact
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            clash-rs/target/${{ matrix.target }}/release/clash-rs${{ matrix.postfix }}
            clash-rs/target/${{ matrix.target }}/release/${{ env.PACKAGE }}${{ matrix.postfix }}
