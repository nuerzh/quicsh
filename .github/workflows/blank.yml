name: CI

on:
  push:
    tags: ["v*"]
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择要编译的平台 (Select Target)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

defaults:
  run:
    shell: bash

env:
  PACKAGE: "clash"
  RUST_TOOLCHAIN: "nightly"

jobs:
  compile:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tool: cargo
            extra-args: -F "plus"
          # Linux arm64 (aarch64)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            tool: cargo
            extra-args: -F "plus"
            rustflags: "-C linker=aarch64-linux-gnu-gcc"
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            tool: cargo
            postfix: ".exe"
            extra-args: -F "plus"

    # 这里的逻辑：非手动触发时运行所有任务；手动触发时根据选项过滤
    if: |
      github.event_name != 'workflow_dispatch' || 
      github.event.inputs.build_target == 'all' || 
      github.event.inputs.build_target == matrix.target

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clash-rs/target
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ matrix.target }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"

      - name: Install aarch64 Cross-Compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Decrypt extra files
        if: "${{ env.TAR_PASS != '' }}" # 防止没有 Secret 时报错
        env:
          TAR_PASS: ${{ secrets.TAR_PASS }}
        run: |
          openssl des3 -md sha256 -d -k ${{ secrets.TAR_PASS }} -salt -in extra.tar.gz | tar -xzvf - || echo "Skip decrypt"

      - name: Cargo build
        working-directory: clash-rs
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.extra-args }} --package clash-rs
        env:
          # 核心修复：合并基础 flags 和矩阵特定的 linker flags
          RUSTFLAGS: --cfg tokio_unstable ${{ matrix.rustflags }}

      - name: Rename and Prepare Artifact
        run: |
          mkdir -p ./dist/
          cp clash-rs/target/${{ matrix.target }}/release/clash-rs${{ matrix.postfix }} ./dist/${{ env.PACKAGE }}-${{ matrix.target }}${{ matrix.postfix }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ./dist/${{ env.PACKAGE }}-${{ matrix.target }}${{ matrix.postfix }}
