name: CI

on:
  push:
    tags: ["v*"]
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择编译平台 (Select Target)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

defaults:
  run:
    shell: bash

env:
  PACKAGE: "clash"
  RUST_TOOLCHAIN: "nightly"

jobs:
  compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            extra-args: -F "plus"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            extra-args: -F "plus"
            rustflags: "-C linker=aarch64-linux-gnu-gcc"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            postfix: ".exe"
            extra-args: -F "plus"

    steps:
      # 这里的 if 判断放在具体的 step 级别，这样就能正常识别 matrix.target
      - name: Check if should run
        id: check_run
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_target }}" != "all" && "${{ github.event.inputs.build_target }}" != "${{ matrix.target }}" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust
        if: steps.check_run.outputs.should_skip != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: steps.check_run.outputs.should_skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install NASM
        if: steps.check_run.outputs.should_skip != 'true'
        uses: ilammy/setup-nasm@v1
      - name: extra Modify
        run: |
          openssl des3 -md sha256 -d -k ${{ secrets.TAR_PASS }} -salt -in extra.tar.gz | tar -xzvf -

      - name: Build
        if: steps.check_run.outputs.should_skip != 'true'
        working-directory: clash-rs
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.extra-args }} --package clash-rs
        env:
          RUSTFLAGS: --cfg tokio_unstable ${{ matrix.rustflags }}

      - name: Upload
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            clash-rs/target/${{ matrix.target }}/release/clash-rs${{ matrix.postfix }}
            clash-rs/target/${{ matrix.target }}/release/${{ env.PACKAGE }}${{ matrix.postfix }}
