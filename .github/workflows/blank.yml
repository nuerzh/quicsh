name: CI

on:
  push:
    tags: ["v*"]
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      build_x86_linux:
        description: '编译 x86_64 Linux'
        type: boolean
        default: true
      build_arm_linux:
        description: '编译 aarch64 Linux (ARM64)'
        type: boolean
        default: true
      build_windows:
        description: '编译 x86_64 Windows'
        type: boolean
        default: true

defaults:
  run:
    shell: bash

env:
  PACKAGE: "clash"
  RUST_TOOLCHAIN: "nightly"

jobs:
  compile:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      TAR_PASS_SECRET: ${{ secrets.TAR_PASS }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            id: x86_linux
            extra-args: -F "plus"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            id: arm_linux
            extra-args: -F "plus"
            rustflags: "-C linker=aarch64-linux-gnu-gcc"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            id: windows
            postfix: ".exe"
            extra-args: -F "plus"

    steps:
      - name: Check if should run
        id: check_run
        run: |
          SHOULD_SKIP="true"
          # 如果是自动触发 (push/pr)，则不跳过
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            SHOULD_SKIP="false"
          fi
          # 如果是手动触发，根据对应的勾选框判断
          if [[ "${{ matrix.id }}" == "x86_linux" && "${{ github.event.inputs.build_x86_linux }}" == "true" ]]; then
            SHOULD_SKIP="false"
          fi
          if [[ "${{ matrix.id }}" == "arm_linux" && "${{ github.event.inputs.build_arm_linux }}" == "true" ]]; then
            SHOULD_SKIP="false"
          fi
          if [[ "${{ matrix.id }}" == "windows" && "${{ github.event.inputs.build_windows }}" == "true" ]]; then
            SHOULD_SKIP="false"
          fi
          echo "should_skip=$SHOULD_SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust Toolchain
        if: steps.check_run.outputs.should_skip != 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rust-src
          default: true

      - name: Verify and Fix Toolchain
        if: steps.check_run.outputs.should_skip != 'true'
        run: |
          rustup default nightly
          rustup target add ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: steps.check_run.outputs.should_skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install NASM
        if: steps.check_run.outputs.should_skip != 'true'
        uses: ilammy/setup-nasm@v1

      - name: Decrypt and Extract Extra Files
        if: steps.check_run.outputs.should_skip != 'true' && env.TAR_PASS_SECRET != ''
        run: |
          openssl des3 -md sha256 -d -k "$TAR_PASS_SECRET" -salt -in extra.tar.gz | tar -xzvf -

      - name: Cargo Build
        if: steps.check_run.outputs.should_skip != 'true'
        working-directory: clash-rs
        run: |
          # 强制使用 +nightly 并开启 -Z build-std 以解决 aarch64 core 库缺失问题
          cargo +nightly build --release --target ${{ matrix.target }} ${{ matrix.extra-args }} -Z build-std=std,panic_abort --package clash-rs
        env:
          RUSTFLAGS: --cfg tokio_unstable ${{ matrix.rustflags }}

      - name: Upload Artifact
        if: steps.check_run.outputs.should_skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            clash-rs/target/${{ matrix.target }}/release/clash-rs${{ matrix.postfix }}
            clash-rs/target/${{ matrix.target }}/release/${{ env.PACKAGE }}${{ matrix.postfix }}
